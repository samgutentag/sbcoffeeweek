name: Fetch Restaurant Hours

on:
  # schedule:
  #   # Daily at 6am PT (13:00 UTC) — adjust date range for next event
  #   - cron: "0 13 17-29 3 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hours:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch hours from Google Places API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 fetch-hours.py

      - name: Commit hours.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hours.json
          git diff --cached --quiet && echo "No changes to hours.json" && exit 0
          git commit -m "Update restaurant hours $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase
          git push
